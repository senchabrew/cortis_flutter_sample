syntax = "proto3";

package cortis_flutter_sample;

message Scale {
  float x = 1;
  float y = 2;
  float z = 3;
}

enum SceneType {
  SCENE_UNSPECIFIED = 0;
  SCENE_CUBE = 1;
  SCENE_SPHERE = 2;
}

// Command+Event パターン: Flutter → Unity のコマンド送信 + Unity → Flutter のイベント受信
message Cube {
  message FCommand {
    message SetScale { Scale scale = 1; }
    message Reset {}
    message Jump { float height = 1; }
    oneof command {
      SetScale set_scale = 1;
      Reset reset = 2;
      Jump jump = 3;
    }
  }

  message UEvent {
    message ScaleChanged { Scale scale = 1; }
    oneof event {
      ScaleChanged scale_changed = 1;
    }
  }
}

// Command+Event パターン (非同期): Flutter → Unity のコマンド送信 + Unity → Flutter の状態通知
message Scene {
  enum Phase {
    PHASE_UNSPECIFIED = 0;
    PHASE_LOADING = 1;
    PHASE_LOADED = 2;
  }

  message FCommand {
    message LoadScene { SceneType scene = 1; }
    oneof command {
      LoadScene load_scene = 1;
    }
  }

  message UEvent {
    message PhaseChanged { Phase phase = 1; }
    oneof event {
      PhaseChanged phase_changed = 1;
    }
  }
}

// Command-only パターン: Flutter → Unity のコマンド受信のみ（イベント発行なし）
message Effect {
  message FCommand {
    message PlaySound { string sound_name = 1; }
    message Vibrate { float duration = 1; }
    oneof command {
      PlaySound play_sound = 1;
      Vibrate vibrate = 2;
    }
  }
}

// Event-only パターン: Unity → Flutter のイベント発行のみ（コマンド受信なし）
message Timer {
  message UEvent {
    message Tick { float elapsed = 1; }
    message Milestone { int32 count = 1; }
    oneof event {
      Tick tick = 1;
      Milestone milestone = 2;
    }
  }
}

// 3層ネストパターン: App → Player → Inventory
// Flutter 側では parse().route().route() で多段ルーティング
message Player {
  message FCommand {
    oneof command {
      Inventory.FCommand inventory = 1;
    }
  }
  message UEvent {
    oneof event {
      Inventory.UEvent inventory = 1;
    }
  }
}

message Inventory {
  message FCommand {
    message AddItem { string item_name = 1; }
    message RemoveItem { string item_name = 1; }
    oneof command {
      AddItem add_item = 1;
      RemoveItem remove_item = 2;
    }
  }
  message UEvent {
    message ItemListChanged { repeated string items = 1; }
    oneof event {
      ItemListChanged item_list_changed = 1;
    }
  }
}

// 共有 inner パターン: Notification は Game と Admin の両方から参照される
// Unity 側では [ProtoRoute] で曖昧性を解消する
// Flutter 側では parse().route() で明示的にパスを指定するので曖昧性は発生しない
message Notification {
  message FCommand {
    message Dismiss { string notification_id = 1; }
    oneof command {
      Dismiss dismiss = 1;
    }
  }
  message UEvent {
    message Arrived { string notification_id = 1; string title = 2; }
    oneof event {
      Arrived arrived = 1;
    }
  }
}

message Game {
  message FCommand {
    oneof command {
      Notification.FCommand notification = 1;
    }
  }
  message UEvent {
    oneof event {
      Notification.UEvent notification = 1;
    }
  }
}

message Admin {
  message FCommand {
    oneof command {
      Notification.FCommand notification = 1;
    }
  }
  message UEvent {
    oneof event {
      Notification.UEvent notification = 1;
    }
  }
}

// Root wrapper: 各フィーチャーの Command / Event を oneof で包む
// Gateway はこの型で通信し、各 Presenter は inner 型を [ProtoHandler] に指定することで
// Source Generator がルーティングコードを自動生成する
message App {
  message FCommand {
    oneof command {
      Cube.FCommand cube = 1;
      Scene.FCommand scene = 2;
      Effect.FCommand effect = 3;
      Player.FCommand player = 4;
      Game.FCommand game = 5;
      Admin.FCommand admin = 6;
    }
  }
  message UEvent {
    oneof event {
      Cube.UEvent cube = 1;
      Scene.UEvent scene = 2;
      Timer.UEvent timer = 3;
      Player.UEvent player = 4;
      Game.UEvent game = 5;
      Admin.UEvent admin = 6;
    }
  }
}
